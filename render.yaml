services:
  - type: web
    name: sentinelai-frontend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://sentinelai-backend.onrender.com
      - key: NODE_VERSION
        value: 20.0.0
