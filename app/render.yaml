services:
  - type: web
    name: sentinelai-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://sentinelai-frontend.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0
