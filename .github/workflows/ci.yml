name: SentinelAI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ── Backend Tests ──
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sentinelai_test
          POSTGRES_USER: sentinelai
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('app/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        env:
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: postgresql://sentinelai:test_password@localhost:5432/sentinelai_test
        run: |
          cd app
          python -c "from database import db; print('Database OK')"
          python -c "import app; print('App imports OK')"

  # ── Frontend Build ──
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sentinelai-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd sentinelai-ui
          npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          cd sentinelai-ui
          npm run build

      - name: Run linting
        run: |
          cd sentinelai-ui
          npm run lint --if-present

  # ── Security Scan ──
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -r "SECRET_KEY\s*=" app/ --include="*.py" | grep -v "os.environ" | grep -v ".env.example"
          ! grep -r "password\s*=" app/ --include="*.py" | grep -v "os.environ" | grep -v "password_hash" | grep -v ".env.example"
          echo "Secrets check passed"

      - name: Check for Math.random in frontend
        run: |
          echo "Checking for Math.random usage..."
          ! grep -r "Math.random()" sentinelai-ui/modules/ --include="*.tsx" --include="*.ts" || true
          echo "Math.random check passed"

  # ── Docker Build ──
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build -t sentinelai-backend:latest ./app

      - name: Build frontend image
        run: |
          docker build -t sentinelai-frontend:latest ./sentinelai-ui

  # ── Deploy (manual trigger) ──
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deployment would happen here"
          echo "Configure your deployment target in GitHub Settings > Environments"
